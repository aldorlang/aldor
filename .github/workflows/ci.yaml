name: Aldor CI

on: [push, pull_request]

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v2
    - name: install dependencies
      run: sudo apt-get install libgmp-dev debhelper fakeroot devscripts

    - name: Capture version
      run: |
         MAIL=build-agent@aldorlang.example.com
         version=$(grep AC_INIT ./aldor/configure.ac | awk -F, '{print $2}' | tr -d '[]')
         dch --newversion "${version}+$(date +%Y%M%d)" 'Build'
         dch -r Relase
         echo "pkg_version=${version}" >> "$GITHUB_ENV"

    - name: build
      run: dpkg-buildpackage -b -us -uc

    - name: Create artifact archives
      run: |
        cd debian && rm -rf aldor/DEBIAN && tar zcf aldor-linux-x86_64-${{ github.sha }}.tar.gz aldor/
        mv aldor-linux-x86_64-${{ github.sha }}.tar.gz ../
        mv ../../aldor_${pkg_version}_amd64.deb ../

# - name: Upload Linux binaries
#      uses: actions/upload-artifact@v4
#      with:
#        name: aldor-linux-x86_64-binary
#        path: |
#          aldor-linux-x86_64-${{ github.sha }}.tar.gz
#          aldor_${pkg_version}_amd64.deb

  build-linux-latest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v2

    - name: install dependencies
      run: sudo apt-get install libgmp-dev debhelper fakeroot build-essential devscripts

    - name: build
      run: dpkg-buildpackage -b -us -uc

